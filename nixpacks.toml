[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "php83Extensions.pgsql", "php83Extensions.redis", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.dom", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.openssl", "php83Extensions.fileinfo", "php83Extensions.bcmath"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-scripts --no-interaction"]

[phases.build]
cmds = [
  "php artisan config:clear",
  "php artisan route:clear"
]

[start]
cmd = "php artisan migrate --force || true && php artisan optimize && php artisan serve --host=0.0.0.0 --port=$PORT"
