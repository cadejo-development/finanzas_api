version: 0.2

# Variables que debes configurar en CodeBuild:
#   AWS_ACCOUNT_ID   → tu ID de cuenta AWS (ej. 123456789012)
#   AWS_REGION       → región (ej. us-east-1)
#   ECR_REPO_NAME    → nombre del repo en ECR (ej. finanzas-api)
#   APPRUNNER_SERVICE_ARN → ARN del servicio App Runner (para forzar redeploy)

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR Private..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - echo "Logging in to Amazon ECR Public (sin rate limit)..."
      - aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws
      - IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-8)

  build:
    commands:
      - echo Building Docker image...
      - docker build -t $IMAGE_URI:$IMAGE_TAG .
      - docker tag $IMAGE_URI:$IMAGE_TAG $IMAGE_URI:latest

  post_build:
    commands:
      - echo Pushing image to ECR...
      - docker push $IMAGE_URI:$IMAGE_TAG
      - docker push $IMAGE_URI:latest
      - echo Triggering App Runner deployment...
      - aws apprunner start-deployment --service-arn $APPRUNNER_SERVICE_ARN --region $AWS_REGION
      - echo Done.
